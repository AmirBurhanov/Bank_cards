spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/bankdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation2025BankAppWithExtraLongStringToMake512Bits
  expiration: 86400000

crypto:
  password: ${CRYPTO_PASSWORD:MySecretPassword2024!}
  salt: ${CRYPTO_SALT:12345678}

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    enabled: true
    path: /v3/api-docs
  show-actuator: true
logging:
  level:
    org.example.bank: DEBUG
    org.springframework.security: DEBUG